x-common-security: &common-security
    user: "1001:1001"
    read_only: true
    tmpfs:
        - /tmp:rw,noexec,nosuid
    cap_drop:
        - ALL
    security_opt:
        - no-new-privileges:true
    mem_limit: 256m
    cpus: 0.5
    pids_limit: 100

services:
    discord-bot:
        <<: *common-security
        build: ./discord-bot
        container_name: discord-bot
        environment:
            - DISCORD_TOKEN=${DISCORD_TOKEN}
            - DISCORD_SECRET=${DISCORD_SECRET}
        ports:
            - "3001:3001"
        depends_on:
            express:
                condition: service_healthy

    express:
        <<: *common-security
        build: ./express
        container_name: express
        environment:
            - REDIS_PASSWORD=${REDIS_PASSWORD}
            - DISCORD_SECRET=${DISCORD_SECRET}
        expose:
            - "80"
        depends_on:
            - redis
        healthcheck:
            test: ["CMD-SHELL", "wget -qO- http://localhost/health >/dev/null || exit 1"]
            interval: 5s
            timeout: 10s
            retries: 5

    redis:
        image: redis:latest
        container_name: redis
        ports:
            - "6379:6379"
        volumes:
            - redis-data:/data
        environment:
            - REDIS_ARGS=--requirepass ${REDIS_PASSWORD} --appendonly yes
        restart: unless-stopped
        
        user: "1001:1001"
        tmpfs:
          - /tmp
        cap_drop:
          - ALL
        mem_limit: 256m
        cpus: 0.5
        pids_limit: 100
        security_opt:
            - no-new-privileges:true

volumes:
    redis-data:
        driver: local
